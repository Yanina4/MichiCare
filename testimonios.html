<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonios - MichiCare 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

/* BODY */
body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#2d143a,#4c1d5a);
  color:white;
  text-align:center;
  padding:30px;
}

/* TITULO */
h1{
  margin-bottom:20px;
  text-shadow:0 0 15px white;
}

/* IMAGEN */
img{
  width:250px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* CONTENEDOR */
.container{
  max-width:400px;
  margin:auto;
}

/* CARD */
.card{
  background:#ffffff15;
  margin:10px 0;
  padding:15px;
  border-radius:20px;
  text-align:left;
  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* FORM */
form{
  margin-top:20px;
  background:#ffffff10;
  padding:15px;
  border-radius:20px;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

/* BOTON */
button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#ff7ac6,#d946ef);
  border:none;
  border-radius:30px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* VOLVER */
a{
  display:block;
  margin-top:20px;
  color:white;
}

</style>
</head>

<body>

<h1>Testimonios 💜</h1>

<img src="https://images.unsplash.com/photo-1558788353-f76d92427f16">
<div class="container" id="lista">

  <div class="card">
    <p><b>Laura:</b> "Excelente atención 🐾"</p>
  </div>

  <div class="card">
    <p><b>Martín:</b> "Mi gato salió feliz 😺"</p>
  </div>

  <div class="card">
    <p><b>Sofía:</b> "Muy profesionales 💜"</p>
  </div>

</div>

<!-- FORMULARIO -->
<form onsubmit="agregarTestimonio(event)">

<input text id="nombre" placeholder="Tu nombre" required>

<textarea text id="mensaje" placeholder="Escribí tu experiencia..." required></textarea>
<button type="submit">Agregar testimonio 💜</button>

</form>

<a href="index.html">⬅ Volver al inicio</a>

<script>

// 👉 GUARDAR TESTIMONIO
function agregarTestimonio(e){
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const mensaje = document.getElementById("mensaje").value;

  const nuevoTestimonio = {
    nombre,
    mensaje
  };

  let lista = JSON.parse(localStorage.getItem("testimonios")) || [];

  lista.push(nuevoTestimonio);

  localStorage.setItem("testimonios", JSON.stringify(lista));

  document.getElementById("nombre").value = "";
  document.getElementById("mensaje").value = "";

  mostrarTestimonios();
}


// 👉 MOSTRAR TESTIMONIOS
function mostrarTestimonios(){

  const lista = JSON.parse(localStorage.getItem("testimonios")) || [];

  const contenedor = document.getElementById("lista");

  contenedor.innerHTML = "";

  lista.forEach(t => {
    const nuevo = document.createElement("div");
    nuevo.classList.add("card");

    nuevo.innerHTML = `
      <p><b>${t.nombre}:</b> "${t.mensaje}"</p>
    `;

    contenedor.appendChild(nuevo);
  });
}

// 👉 CARGAR AL INICIO
mostrarTestimonios();

</script>

</script>

</body>
</html>
