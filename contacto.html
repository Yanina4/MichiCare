<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contacto - MichiCare 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;}

/* BODY */
body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#2d143a,#4c1d5a);
  color:white;
  text-align:center;
  padding:30px;
}

/* TITULO */
h1{
  margin-bottom:20px;
  text-shadow:0 0 15px white;
}

/* IMAGEN */
img{
  width:250px;
  border-radius:20px;
  margin-bottom:20px;
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* CONTENEDOR */
.container{
  max-width:400px;
  margin:auto;
}

/* INFO */
.info{
  background:#ffffff15;
  padding:15px;
  border-radius:20px;
  margin-bottom:20px;
}

/* REDES */
.redes a{
  display:block;
  margin:8px 0;
  padding:10px;
  background:linear-gradient(135deg,#ff7ac6,#d946ef);
  border-radius:30px;
  color:white;
  text-decoration:none;
}

/* FORM */
form{
  background:#ffffff10;
  padding:15px;
  border-radius:20px;
}

/* INPUT */
input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:none;
}

/* BOTON */
button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#ff7ac6,#d946ef);
  border:none;
  border-radius:30px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  transform:scale(1.05);
}

/* RESULTADO */
#mensajeOK{
  margin-top:15px;
  display:none;
  background:#ffffff20;
  padding:10px;
  border-radius:15px;
}

/* VOLVER */
a.volver{
  display:block;
  margin-top:20px;
  color:white;
}

</style>
</head>

<body>

<h1>Contacto & Redes 💜</h1>

<img src="https://i.pinimg.com/1200x/24/0b/94/240b94fc2b54975782ae7788c7fb2a60.jpg" alt="gatito en cesta">

<div class="container">

  <!-- INFO -->
  <div class="info">
    <p>📧 Email: michicare@gmail.com</p>
    <p>📞 Tel: 123456789</p>
    <p>📍 Ubicación: Buenos Aires</p>
  </div>

  <!-- REDES -->
  <div class="redes">
    <a href="#">🌸 Instagram</a>
    <a href="#">🌸 Facebook</a>
    <a href="#">🌸 Twitter</a>
  </div>

  <!-- FORMULARIO -->
  <form onsubmit="enviarMensaje(event)">

    <input type="text" id="nombre" placeholder="Tu nombre" required>

    <textarea id="mensaje" placeholder="Escribí tu mensaje..." required></textarea>

    <button type="submit">Enviar 💜</button>

  </form>

  <div id="mensajeOK">Mensaje enviado correctamente 💜</div>

</div>

<a href="index.html" class="volver">⬅ Volver al inicio</a>

<script>

function enviarMensaje(e){
  e.preventDefault();

  document.getElementById("mensajeOK").style.display = "block";

  document.getElementById("nombre").value = "";
  document.getElementById("mensaje").value = "";
}

</script>

</body>
</html>
