<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Turnos - MichiCare 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#2d143a,#4c1d5a);
  color:white;
  text-align:center;
  padding:30px;
}

h1{
  margin-bottom:20px;
  text-shadow:0 0 15px white;
}

form{
  background:#ffffff15;
  padding:20px;
  border-radius:20px;
  max-width:350px;
  margin:auto;
  box-shadow:0 0 20px rgba(0,0,0,0.3);
}

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#ff7ac6,#d946ef);
  border:none;
  border-radius:30px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

#resultado{
  margin-top:20px;
  background:#ffffff20;
  padding:15px;
  border-radius:15px;
}

.card{
  background:#ffffff20;
  margin:10px auto;
  padding:15px;
  border-radius:15px;
  max-width:350px;
}

a{
  display:block;
  margin-top:20px;
  color:white;
}

</style>
</head>

<body>

<h1>Sacar Turno 🐾</h1>

<img src="https://images.unsplash.com/photo-1517849845537-4d257902454a" width="250">

<form onsubmit="guardarTurno(event)">

<input type="text" id="nombre" placeholder="Nombre del animal" required>

<select id="especie" required>
  <option value="">Especie</option>
  <option>Perro</option>
  <option>Gato</option>
  <option>Loro</option>
  <option>Otro</option>
</select>

<input type="number" id="peso" placeholder="Peso (kg)" required>

<select id="consulta" required>
  <option value="">Tipo de consulta</option>
  <option>Vacunación</option>
  <option>Antirrábica</option>
  <option>Refuerzo antiparasitario</option>
  <option>Control</option>
  <option>Emergencia</option>
</select>

<input type="date" id="fecha" required>
<input type="time" id="hora" required>

<button type="submit">Confirmar turno 💜</button>

</form>

<div id="resultado"></div>

<h2 style="margin-top:30px;">📅 Turnos guardados</h2>
<div id="turnos"></div>

<a href="index.html">⬅ Volver al inicio</a>

<script>

// 👉 GUARDAR TURNO
function guardarTurno(e){
  e.preventDefault();

  const turno = {
    nombre: document.getElementById("nombre").value,
    especie: document.getElementById("especie").value,
    peso: document.getElementById("peso").value,
    consulta: document.getElementById("consulta").value,
    fecha: document.getElementById("fecha").value,
    hora: document.getElementById("hora").value
  };

  let turnos = JSON.parse(localStorage.getItem("turnos")) || [];
  turnos.push(turno);
  localStorage.setItem("turnos", JSON.stringify(turnos));

  document.getElementById("resultado").innerHTML = `
    <h2>🐾 Turno confirmado</h2>
    <p><b>Mascota:</b> ${turno.nombre}</p>
    <p><b>Especie:</b> ${turno.especie}</p>
    <p><b>Peso:</b> ${turno.peso} kg</p>
    <p><b>Consulta:</b> ${turno.consulta}</p>
    <p><b>Fecha:</b> ${turno.fecha}</p>
    <p><b>Hora:</b> ${turno.hora}</p>

    <h3>📞 Contacto para cancelación</h3>
    <p>+54 9 XXX XXX XXXX</p>
  `;

  document.querySelector("form").reset();

  mostrarTurnos();
}


// 👉 MOSTRAR TURNOS
function mostrarTurnos(){

  const turnos = JSON.parse(localStorage.getItem("turnos")) || [];
  const contenedor = document.getElementById("turnos");

  contenedor.innerHTML = "";

  turnos.forEach(t => {
    contenedor.innerHTML += `
      <div class="card">
        <p><b>Mascota:</b> ${t.nombre}</p>
        <p><b>Especie:</b> ${t.especie}</p>
        <p><b>Peso:</b> ${t.peso} kg</p>
        <p><b>Consulta:</b> ${t.consulta}</p>
        <p><b>Fecha:</b> ${t.fecha}</p>
        <p><b>Hora:</b> ${t.hora}</p>
      </div>
    `;
  });
}


// 👉 CARGAR AL INICIO
mostrarTurnos();

</script>

</body>
</html>
