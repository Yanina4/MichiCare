<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Turno Confirmado 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>

body{
  font-family:'Poppins', sans-serif;
  background:linear-gradient(135deg,#2d143a,#4c1d5a);
  color:white;
  text-align:center;
  padding:40px;
}

.card{
  background:#ffffff20;
  padding:20px;
  border-radius:20px;
  max-width:350px;
  margin:auto;
}

h1{
  text-shadow:0 0 15px white;
}

a{
  display:block;
  margin-top:20px;
  color:white;
}

</style>
</head>

<body>

<h1>Turno Confirmado 💜🐾</h1>
<img src="https://images.unsplash.com/photo-1595433562696-3b6c2c4f0d5d">

<div class="card" id="datos"></div>

<a href="index.html">⬅ Volver al inicio</a>

<script>

// TRAER DATOS
const nombre = localStorage.getItem("nombre");
const especie = localStorage.getItem("especie");
const peso = localStorage.getItem("peso");
const consulta = localStorage.getItem("consulta");

// MOSTRAR
document.getElementById("datos").innerHTML = `
  <p><b>Mascota:</b> ${nombre}</p>
  <p><b>Especie:</b> ${especie}</p>
  <p><b>Peso:</b> ${peso} kg</p>
  <p><b>Consulta:</b> ${consulta}</p>
`;

</script>

</body>
</html>
